name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - brama-be/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-be.yml
      - scripts/deploy-be.sh

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        env:
          BE_DEPLOY_HOST: ${{ secrets.BE_DEPLOY_HOST }}
          BE_DEPLOY_PORT: ${{ secrets.BE_DEPLOY_PORT || '22' }}
          BE_DEPLOY_USER: ${{ secrets.BE_DEPLOY_USER }}
          BE_DEPLOY_SSH_KEY: ${{ secrets.BE_DEPLOY_SSH_KEY }}
          BE_DEPLOY_PATH: ${{ secrets.BE_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail

          for name in BE_DEPLOY_HOST BE_DEPLOY_PORT BE_DEPLOY_USER BE_DEPLOY_SSH_KEY BE_DEPLOY_PATH; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

          install -m 700 -d ~/.ssh
          printf '%s\n' "$BE_DEPLOY_SSH_KEY" > ~/.ssh/brama_be_deploy_key
          chmod 600 ~/.ssh/brama_be_deploy_key
          ssh-keyscan -p "$BE_DEPLOY_PORT" -H "$BE_DEPLOY_HOST" >> ~/.ssh/known_hosts

          remote_app_dir="$(printf '%q' "$BE_DEPLOY_PATH")"

          ssh \
            -i ~/.ssh/brama_be_deploy_key \
            -p "$BE_DEPLOY_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$BE_DEPLOY_USER@$BE_DEPLOY_HOST" \
            "cd ${remote_app_dir} && git fetch origin main && git checkout main && git pull --ff-only origin main && APP_DIR=${remote_app_dir} SERVICE_NAME=lublin-assistant BRANCH=main HEALTH_URL=http://127.0.0.1:4000/health bash scripts/deploy-be.sh"
